<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CO2 Transparency</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>

  <body class="bg-light" data-page="index">
    <div id="siteHeader"></div>

    <main class="container-fluid py-4 px-3">
      <div class="row g-4">
        <aside id="menuCol" class="col-12 col-lg-3">
          <div id="siteMenu"></div>
        </aside>

        <section id="contentCol" class="col-12 col-lg-9">
          <div id="filtersSection" class="card shadow-sm">
            <div class="card-body">
              <h1 class="h5 mb-1">Transparenz ueber CO2 Emissionen</h1>
              <p class="text-muted small mb-3">Fiktive Daten. Filter und Sortierung dienen der Demo.</p>

              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label for="countryInput" class="form-label small fw-semibold mb-1">Land</label>
                  <input id="countryInput" class="form-control" type="text" placeholder="Zum Beispiel Deutschland" autocomplete="off" />
                </div>

                <div class="col-12 col-md-6">
                  <label for="companyInput" class="form-label small fw-semibold mb-1">Unternehmen</label>
                  <input id="companyInput" class="form-control" type="text" placeholder="Zum Beispiel Rhein oder Energie" autocomplete="off" />
                </div>
              </div>

              <div class="d-flex flex-wrap gap-2 align-items-center mt-3">
                <button id="resetBtn" class="btn btn-dark btn-sm" type="button">Filter zurücksetzen</button>

                <span class="text-muted small">
                  Treffer: <span id="countBadge" class="badge text-bg-secondary">0</span>
                </span>

                <span class="text-muted small">
                  Sicherheit: Eingaben werden als Text verarbeitet (kein HTML).
                </span>
              </div>
            </div>
          </div>

          <div id="tableSection" class="card shadow-sm mt-4">
            <div class="card-body">
              <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
                <h2 class="h6 mb-0">CO2 Tabelle</h2>
                <div class="text-muted small">
                  Sortierung: <span id="sortInfo" class="font-monospace">CO2 absteigend</span>
                </div>
              </div>

              <div class="table-responsive">
                <table class="table table-sm align-middle mb-0">
                  <thead>
                    <tr>
                      <th scope="col"><button class="btn btn-link p-0 sort-btn" data-sort="country" type="button">Land</button></th>
                      <th scope="col"><button class="btn btn-link p-0 sort-btn" data-sort="company" type="button">Unternehmen</button></th>
                      <th scope="col" class="text-end"><button class="btn btn-link p-0 sort-btn" data-sort="co2" type="button">CO2 (Mt pro Jahr)</button></th>
                      <th scope="col"><button class="btn btn-link p-0 sort-btn" data-sort="year" type="button">Jahr</button></th>
                    </tr>
                  </thead>
                  <tbody id="tableBody"></tbody>
                </table>
              </div>

              <div id="emptyState" class="alert alert-secondary mt-3 mb-0 d-none" role="alert">
                Keine Daten vorhanden
              </div>

              <!-- Pagination / page size (bottom center) -->
              <div class="d-flex justify-content-center align-items-center gap-3 mt-3 flex-wrap">
                <label for="pageSizeSelect" class="small text-muted m-0">Einträge pro Seite:</label>

                <select id="pageSizeSelect" class="form-select form-select-sm" style="width: 120px;">
                  <option value="5">5</option>
                  <option value="10" selected>10</option>
                  <option value="20">20</option>
                  <option value="50">50</option>
                </select>

                <div class="small text-muted">
                  Anzeige <span id="rangeInfo">0–0</span> von <span id="totalInfo">0</span>
                  (Seite <span id="pageInfo">1 / 1</span>)
                </div>

                <div class="btn-group" role="group" aria-label="Seitennavigation">
                  <button id="prevPageBtn" type="button" class="btn btn-outline-secondary btn-sm">Zurück</button>
                  <button id="nextPageBtn" type="button" class="btn btn-outline-secondary btn-sm">Weiter</button>
                </div>

              </div>
            </div>
          </div>

        </section>
      </div>
    </main>

    <div id="siteFooter"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/layout.js"></script>
    <script src="./assets/js/table.js"></script>
  </body>
</html>
